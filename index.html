<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程文件管理系統</title>
    <style>
        :root {
            --primary-cyan: #23c1d7; 
            --dark-blue: #003087;    
            --light-blue: #f0fbfc;
            --bg-color: #ffffff;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            letter-spacing: 1px;
        }

        body {
            background-color: var(--bg-color);
            margin: 0; padding: 0; 
            min-height: 100vh;
            position: relative;
            color: var(--text-color);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://lh3.googleusercontent.com/d/1401cF0iCr8TC2VtHcsJxupwsf-bVNM5S'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.4);
            z-index: -1;
        }

        header { padding: 60px 0 30px 0; }

        .title-container {
            display: inline-block;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.1);
            border-radius: 0 50px 50px 0;
            overflow: hidden;
            background: white;
        }

        .main-title {
            background-color: var(--primary-cyan);
            color: white;
            padding: 15px 60px 10px 40px;
            font-size: 1.8rem; font-weight: bold;
            margin: 0;
        }

        .sub-title {
            color: var(--dark-blue);
            padding: 10px 60px 15px 40px;
            font-size: 1.6rem; font-weight: bold;
            margin: 0; letter-spacing: 8px;
        }

        .container {
            max-width: 1200px; margin: 20px auto;
            padding: 0 40px 120px 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section-title {
            font-size: 1.4rem;
            color: var(--dark-blue);
            border-left: 6px solid var(--primary-cyan);
            padding-left: 15px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .menu-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .menu-item {
            display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.85); 
            padding: 22px 25px;
            text-decoration: none; color: var(--dark-blue);
            border: 1px solid rgba(35, 193, 215, 0.3); 
            border-radius: 6px;
            font-size: 1.3rem; font-weight: bold;
            transition: all 0.3s ease; cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .menu-item::before {
            content: "◆"; color: var(--primary-cyan);
            margin-right: 18px; font-size: 1rem;
        }

        .menu-item:hover {
            background-color: var(--light-blue);
            border-color: var(--primary-cyan);
            transform: translateX(8px);
            box-shadow: -6px 6px 0px var(--primary-cyan);
        }

        .sub-menu {
            grid-column: 1 / -1;
            display: none; 
            background-color: rgba(244, 251, 252, 0.95);
            padding: 20px; border-radius: 10px;
            border-left: 10px solid var(--primary-cyan);
            margin-top: -10px;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            animation: fadeIn 0.3s ease-out;
        }

        .sub-item {
            display: block; background: white;
            padding: 12px 15px; text-decoration: none;
            color: var(--text-color); border: 1px solid var(--primary-cyan);
            border-radius: 4px; font-size: 1.1rem; font-weight: bold;
            text-align: center;
        }

        .sub-item:hover { background-color: var(--primary-cyan); color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-bar {
            position: fixed; bottom: 0; width: 100%; height: 10px;
            background: linear-gradient(to right, var(--primary-cyan), var(--dark-blue));
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1 class="main-title">臺北港南碼頭C填區公共設施及永久護岸暨S04~S05碼頭工程(含南一碼頭)</h1>
            <h2 class="sub-title">文件管理系統</h2>
        </div>
    </header>

    <div class="container">
        
        <section>
            <div class="section-title">行政與計畫管理</div>
            <div class="menu-group">
                <a href="https://drive.google.com/drive/u/1/folders/1RdmqyDhBStbvtedcn1CCf8fKfuVHBFmr" target="_blank" class="menu-item">合約文件</a>
                
                <div class="menu-item" onclick="toggleMenu('daily-sub')">日月報表</div>
                <div id="daily-sub" class="sub-menu">
                    <a href="https://drive.google.com/drive/u/1/folders/1kWji4hX1YndMKJj4A_MU12DgPYs7VEFW" target="_blank" class="sub-item">111年報表</a>
                    <a href="https://drive.google.com/drive/u/1/folders/15QccUvz4yIYLd2W9gLMLxIisUoU5CWg5" target="_blank" class="sub-item">112年報表</a>
                    <a href="https://drive.google.com/drive/u/1/folders/16HrV8c1SqtP_xCcDCbswKnEU6vd3uAtl" target="_blank" class="sub-item">113年報表</a>
                    <a href="https://drive.google.com/drive/u/1/folders/1xibs3Bl1dMmf35msdS72-20Z4i8SGOeM" target="_blank" class="sub-item">114年報表</a>
                    <a href="https://drive.google.com/drive/u/1/folders/1rjDJdmc12pCIZVIP8NUAR9OzbzEpvm8w" target="_blank" class="sub-item">115年報表</a>
                    <a href="#" target="_blank" class="sub-item">116年報表</a>
                </div>

                <a href="https://drive.google.com/drive/u/1/folders/1dc8dCFmkgtJFnpIH-Tcmu6dyiFO0Y4fd" target="_blank" class="menu-item">往來文件</a>

                <div class="menu-item" onclick="toggleMenu('design-sub')">設計圖</div>
                <div id="design-sub" class="sub-menu">
                    <a href="https://drive.google.com/drive/u/1/folders/127pUqW9-Uemy9fMR69hCf1YuZnpd-BdO" target="_blank" class="sub-item">原始設計圖</a>
                    <a href="https://drive.google.com/drive/u/1/folders/1CwAEseTgNoQZ7Gk-IGefbs_wAfE6cikc" target="_blank" class="sub-item">變更設計</a>
                </div>

                <div class="menu-item" onclick="toggleMenu('plans-sub')">各項計畫書</div>
                <div id="plans-sub" class="sub-menu">
                    <a href="https://drive.google.com/drive/u/1/folders/1-9rW1E68gU5VsiVOZJurJrHnSJmVwC5g" target="_blank" class="sub-item">監造計畫</a>
                    <a href="https://drive.google.com/drive/u/1/folders/1UCWS09h_XelONttHYV63W3LCOBD2vIRr" target="_blank" class="sub-item">施工圖</a>
                    <a href="https://drive.google.com/drive/u/1/folders/1XSgELUOLQ39pWWp2ptAZbIMzitkzpCdZ" target="_blank" class="sub-item">施工計畫書</a>
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">施工與材料品質控制</div>
            <div class="menu-group">
                <a href="https://drive.google.com/drive/u/1/folders/16iNqTERt_CRSUBBOPTVpsIrLKZ1m_ziC" target="_blank" class="menu-item">施工抽查</a>
                <a href="https://drive.google.com/drive/u/1/folders/1UC0UTYqZ7Ph2RsuEVxa8LAwun5QafVks" target="_blank" class="menu-item">材料抽檢</a>
            </div>
        </section>

        <section>
            <div class="section-title">缺失與追蹤</div>
            <div class="menu-group">
                <a href="https://drive.google.com/drive/u/1/folders/15lEoSFo4KacD17vgY34ozOy5ilX3Ub6s" target="_blank" class="menu-item">品管缺失</a>
                <a href="https://drive.google.com/drive/u/1/folders/1dcUhjPuOTvYGjIN386-TeYScnjogbc-L" target="_blank" class="menu-item">安衛缺失</a>
            </div>
        </section>

        <section>
            <div class="section-title">安衛環保執行紀錄</div>
            <div class="menu-group">
                <div class="menu-item" onclick="toggleMenu('safety-sub')">安衛環保執行紀錄</div>
                <div id="safety-sub" class="sub-menu">
                    <a href="#" target="_blank" class="sub-item">安衛環保定期查核紀錄表</a>
                    <a href="#" target="_blank" class="sub-item">安衛環保扣款通知單</a>
                    <a href="#" target="_blank" class="sub-item">工具箱會議紀錄</a>
                    <a href="#" target="_blank" class="sub-item">協議組織會議紀錄</a>
                    <a href="#" target="_blank" class="sub-item">颱風防汛資料</a>
                    <a href="#" target="_blank" class="sub-item">公共工程生態檢核</a>
                </div>
            </div>
        </section>

    </div>

    <div class="footer-bar"></div>

    <script>
        function toggleMenu(id) {
            var menu = document.getElementById(id);
            var isVisible = menu.style.display === "grid";
            
            var allMenus = document.querySelectorAll('.sub-menu');
            allMenus.forEach(function(m) { m.style.display = "none"; });
            
            if (!isVisible) {
                menu.style.display = "grid";
            }
        }
    </script>
</body>
</html>
